  .badge { flex-shrink: 0; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; min-width: 72px; text-align: center; }

  .ad-label { flex: 1; font-size: 0.83rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ad-arrow { flex-shrink: 0; color: #ccc; font-size: 0.78rem; }
  .due-dot { width: 7px; height: 7px; border-radius: 50%; background: #e6a817; flex-shrink: 0; }
  .no-results { text-align: center; color: #bbb; padding: 60px 20px; font-size: 0.88rem; }

};

document.getElementById('dataDate').textContent = 'Updated ' + DATA_DATE;

function groupByProperty(ads) {
  const map = {};
  for (const ad of ads) {
    if (!map[ad.property]) map[ad.property] = [];
    map[ad.property].push(ad);
  }
  return map;
}

function badgeClass(account) {
  if (account === 'RWC') return 'badge-rwc';
  if (account === 'CNR') return 'badge-cnr';
  if (account === 'Marketplace') return 'badge-mkt';
  return 'badge-other';
}

function adLabel(ad) {
  const num = ad.num ? ' ' + ad.num : '';
  return ad.account + num + ' · ' + ad.platform;
}

function buildCards(adsData) {
  const grouped = groupByProperty(adsData);
  const withAds = Object.keys(grouped).sort();
  const mediaOnlyKeys = Object.keys(MEDIA_ONLY).filter(k => !grouped[k]).sort();
  const sorted = [...withAds, ...mediaOnlyKeys];

  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  let cardCount = 0;

  for (const prop of sorted) {
    const propAds = grouped[prop] || [];
    const propMedia = (MEDIA[prop] || []).concat(MEDIA_ONLY[prop] || []);
    if (!propAds.length && !propMedia.length) continue;

    const card = document.createElement('div');
    card.className = 'prop-card';
    let html = '<div class="prop-header"><div class="prop-name">' + prop + '</div></div><div class="ad-list">';

    for (const ad of propAds) {
      const bc = badgeClass(ad.account);
      const label = adLabel(ad);
      const isDue = ad.status === 'Due';
      html += '<a class="ad-row" href="' + ad.link + '" target="_blank" rel="noopener">'
            + '<span class="badge ' + bc + '">' + ad.account + (ad.num ? ' ' + ad.num : '') + '</span>'
            + '<span class="ad-label">' + label + (isDue ? ' <span style="color:#e6a817;font-size:0.75rem;">· Due</span>' : '') + '</span>'
            + (isDue ? '<span class="due-dot"></span>' : '')
            + '<span class="ad-arrow">›</span>'
            + '</a>';
    }

    for (const m of propMedia) {
      const mc = m.type === 'video' ? 'badge-video' : m.type === 'photos' ? 'badge-photos' : 'badge-media';
      const tl = m.type === 'video' ? 'VIDEO' : m.type === 'photos' ? 'PHOTOS' : 'MEDIA';
      html += '<a class="ad-row" href="' + m.url + '" target="_blank" rel="noopener">'
            + '<span class="badge ' + mc + '">' + tl + '</span>'
            + '<span class="ad-label">' + m.title + '</span>'
            + '<span class="ad-arrow">›</span>'
            + '</a>';
    }

    html += '</div>';
    card.innerHTML = html;
    container.appendChild(card);
    cardCount++;
  }

  document.getElementById('countBar').textContent = adsData.length + ' active ads · ' + cardCount + ' properties';
  if (!cardCount) container.innerHTML = '<div class="no-results">No results found.</div>';
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (!q) { buildCards(ADS_DATA); return; }
  const filtered = ADS_DATA.filter(a =>
    a.property.toLowerCase().includes(q) ||
    a.platform.toLowerCase().includes(q) ||
    (a.account || '').toLowerCase().includes(q)
  );
  buildCards(filtered);
}

buildCards(ADS_DATA);
