function groupByProperty(ads) {

}
function badgeClass(account) {

      const label = adLabel(ad);

            + '<span class="ad-label">' + label + (isDue ? ' <span style="color:#e6a817;font-size:0.75rem;">· Due</span>' : '') + '</span>'
            + (isDue ? '<span class="due-dot"></span>' : '')
            + '<span class="ad-arrow">›</span></a>';
    }
    for (const m of propMedia) {
      const mc = m.type === 'video' ? 'badge-video' : m.type === 'photos' ? 'badge-photos' : 'badge-media';
      const tl = m.type === 'video' ? 'VIDEO' : m.type === 'photos' ? 'PHOTOS' : 'MEDIA';
      html += '<a class="ad-row" href="' + m.url + '" target="_blank" rel="noopener">'
            + '<span class="badge ' + mc + '">' + tl + '</span>'
            + '<span class="ad-label">' + m.title + '</span>'
            + '<span class="ad-arrow">›</span></a>';
    }
    html += '</div>';
    card.innerHTML = html;
    container.appendChild(card);
    cardCount++;
  }
  document.getElementById('countBar').textContent = adsData.length + ' active ads · ' + cardCount + ' properties';
  if (!cardCount) container.innerHTML = '<div class="no-results">No results found.</div>';
}
function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();

    a.platLabel.toLowerCase().includes(q) ||
    (a.account || '').toLowerCase().includes(q)
  );
  buildCards(filtered);
}
