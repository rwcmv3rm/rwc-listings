name: Refresh RWC Ad Directory

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes, 24/7
  workflow_dispatch:           # manual trigger button in GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch sheet and build HTML
        run: |
          python3 << 'PYEOF'
          import requests, json, re, os
          from datetime import datetime
          from collections import defaultdict

          SHEET_ID = "1dtWpORf_cVsIcRxNY8Bwg9LXemoCYdXLiL0EKF7VvIQ"
          API_KEY  = "AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY"  # public sheets read-only key

          # Fetch the sheet as CSV via public URL
          url = f"https://docs.google.com/spreadsheets/d/{SHEET_ID}/export?format=csv&gid=932558371"
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          content = r.text
          print(f"Fetched {len(content)} chars")

          CL_ID_RE = re.compile(r'/(\d{9,13})(?:\.html)?')
          ACTIVE_STATUSES = {'current', 'due', 'renewed'}

          def normalise_platform(raw):
              r = (raw or '').strip()
              lo = r.lower()
              if 'marketplace' in lo: return 'Facebook Marketplace', 'Marketplace'
              if 'liv.rent' in lo or 'liv rent' in lo: return 'Liv.Rent', 'Liv.Rent'
              if 'rentfaster' in lo: return 'RentFaster', 'RentFaster'
              if 'kijiji' in lo: return 'Kijiji', 'Kijiji'
              if 'craigslist' in lo or 'cragslist' in lo:
                  if re.search(r'rwc|monica', r, re.I): return 'Craigslist', 'RWC'
                  if re.search(r'cnr|derrick', r, re.I): return 'Craigslist', 'CNR'
                  return 'Craigslist', ''
              return r, ''

          def fix_url(u):
              u = (u or '').strip()
              if u and not u.startswith('http'):
                  u = 'https://' + u
              return u

          def extract_cl_id(url):
              m = CL_ID_RE.search(url or '')
              return m.group(1) if m else ''

          import csv, io
          reader = csv.reader(io.StringIO(content))
          rows_raw = list(reader)

          # Find header row
          header_idx = None
          for i, row in enumerate(rows_raw):
              if len(row) >= 3 and row[0].strip().upper() == 'PROPERTY' and row[1].strip().upper() == 'PLATFORM':
                  header_idx = i
                  break

          if header_idx is None:
              print("ERROR: header not found"); exit(1)

          seen_cl_ids = set()
          seen_urls = set()
          rows = []

          for row in rows_raw[header_idx+1:]:
              if len(row) < 4: continue
              property_ = row[0].strip()
              platform_ = row[1].strip()
              status_   = row[2].strip()
              link_     = fix_url(row[3]) if len(row) > 3 else ''
              cl_id_    = row[4].strip() if len(row) > 4 else ''
              post_date_= row[5].strip() if len(row) > 5 else ''
              notes_    = row[6].strip() if len(row) > 6 else ''

              if not property_ or not platform_: continue
              if property_.startswith('📌') or 'TEAM NOTES' in property_.upper(): continue
              if status_.lower() not in ACTIVE_STATUSES: continue
              if not link_ or not link_.startswith('http'): continue

              cl_id_val = extract_cl_id(link_) or cl_id_
              if cl_id_val:
                  if cl_id_val in seen_cl_ids: continue
                  seen_cl_ids.add(cl_id_val)
              else:
                  if link_ in seen_urls: continue
                  seen_urls.add(link_)

              plat_label, account = normalise_platform(platform_)
              rows.append({
                  'property': property_, 'platform': platform_,
                  'platLabel': plat_label, 'account': account,
                  'status': status_, 'link': link_,
                  'craigslist_id': cl_id_val, 'post_date': post_date_,
                  'notes': notes_, 'repost_date': '', 'num': 0,
              })

          # Number entries where same property+account has >1 link
          by_pa = defaultdict(list)
          for r in rows:
              by_pa[(r['property'], r['account'])].append(r)
          for group in by_pa.values():
              if len(group) > 1:
                  for i, ad in enumerate(group, 1):
                      ad['num'] = i

          rows.sort(key=lambda r: (r['property'], r['platLabel'], r['account']))
          print(f"Active ads: {len(rows)}")

          data_date = datetime.utcnow().strftime("%B %d, %Y at %I:%M %p UTC")
          ads_json  = json.dumps(rows)

          MEDIA = json.dumps({
            "2309 SHANGRI-LA":    [{"title":"Shangri-La — Media Folder","url":"https://drive.google.com/drive/folders/1OyTM5vDvF6B1ZyBoJRAW9wuiGavW9OPi","type":"media"}],
            "1901 SHANGRI-LA":    [{"title":"Shangri-La — Media Folder","url":"https://drive.google.com/drive/folders/1OyTM5vDvF6B1ZyBoJRAW9wuiGavW9OPi","type":"media"}],
            "2708 SHANGRI-LA":    [{"title":"Shangri-La — Media Folder","url":"https://drive.google.com/drive/folders/1OyTM5vDvF6B1ZyBoJRAW9wuiGavW9OPi","type":"media"}],
            "2902 SHANGRI-LA":    [{"title":"Shangri-La — Media Folder","url":"https://drive.google.com/drive/folders/1OyTM5vDvF6B1ZyBoJRAW9wuiGavW9OPi","type":"media"}],
            "2903 PATINA":        [{"title":"The Patina — Photos","url":"https://drive.google.com/drive/folders/12Ob22MWiPsWVSbTbDmCCA2u87z6acFCH","type":"photos"},{"title":"The Patina — Video Tour","url":"https://drive.google.com/file/d/1l1aH7gO_8-3FbPnLWDhtEwB9oAIMhPJh","type":"video"}],
            "4006 FAIRMONT":      [{"title":"Fairmont Pacific Rim — Media","url":"https://drive.google.com/drive/folders/1gUPKggvIME7k54029PqJ-rbUQuTUhAmQ","type":"media"}],
            "2303 FAIRMONT":      [{"title":"Fairmont Pacific Rim — Media","url":"https://drive.google.com/drive/folders/1gUPKggvIME7k54029PqJ-rbUQuTUhAmQ","type":"media"}],
            "1501 HG2":           [{"title":"HG2 — Media Folder","url":"https://drive.google.com/drive/folders/1AhxPeoAn0GL6Cc-Tf0PPENkIdnScOno3","type":"media"}],
            "2702 HG2":           [{"title":"HG2 — Media Folder","url":"https://drive.google.com/drive/folders/1AhxPeoAn0GL6Cc-Tf0PPENkIdnScOno3","type":"media"}],
            "3401 PACIFIC":       [{"title":"3401 Pacific — Media","url":"https://drive.google.com/drive/folders/10sAJ1m-ecKME5qokFJprpK53eXDehXIC","type":"media"}],
            "3603 ROGERS":        [{"title":"Rogers Tower — Video Tour","url":"https://drive.google.com/file/d/1KJI3gQTYu6qKQRQZL3w2Fj5YxDsfpTr4","type":"video"}],
            "2402 HOTEL GEORGIA": [{"title":"Hotel Georgia 2402 — Video","url":"https://drive.google.com/file/d/1ITkOSQcMFomTlcG9AZWSDN0kxLqxGqTz","type":"video"}],
          })
          MEDIA_ONLY = json.dumps({
            "HG3":             [{"title":"HG3 — Media Folder","url":"https://drive.google.com/drive/folders/1FFGPQ1NLbd9Wo626PKBxP2pj0BBmEmsV","type":"media"}],
            "NW MARINE DRIVE": [{"title":"NW Marine Drive — Media","url":"https://drive.google.com/drive/folders/18R_Ntn6Dosq9KUH3j9UA5q2rqCRrVRU6","type":"media"}],
          })

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta http-equiv="refresh" content="300">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>RWC Active Listings</title>
          <style>
            * {{ box-sizing: border-box; margin: 0; padding: 0; }}
            body {{ background: #f5f5f5; color: #111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 0 0 48px; }}
            .header {{ background: #fff; border-bottom: 1px solid #e0e0e0; padding: 20px 16px 14px; text-align: center; position: sticky; top: 0; z-index: 10; }}
            .header h1 {{ font-size: 1.35rem; font-weight: 700; letter-spacing: 0.07em; color: #111; }}
            .header .subtitle {{ font-size: 0.7rem; color: #999; margin-top: 5px; letter-spacing: 0.03em; }}
            .search-wrap {{ padding: 14px 16px 2px; max-width: 600px; margin: 0 auto; }}
            .search-wrap input {{ width: 100%; background: #fff; border: 1px solid #ddd; border-radius: 8px; color: #111; font-size: 0.88rem; padding: 10px 14px; outline: none; }}
            .search-wrap input::placeholder {{ color: #aaa; }}
            .search-wrap input:focus {{ border-color: #999; }}
            .count-bar {{ text-align: center; color: #aaa; font-size: 0.72rem; padding: 8px 0 2px; }}
            .container {{ max-width: 600px; margin: 0 auto; padding: 10px 16px 0; }}
            .prop-card {{ background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }}
            .prop-header {{ padding: 13px 16px 11px; border-bottom: 1px solid #f0f0f0; }}
            .prop-name {{ font-size: 0.92rem; font-weight: 700; letter-spacing: 0.045em; color: #111; }}
            .ad-row {{ display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid #f5f5f5; text-decoration: none; color: inherit; transition: background 0.12s; }}
            .ad-row:last-child {{ border-bottom: none; }}
            .ad-row:hover {{ background: #fafafa; }}
            .badge {{ flex-shrink: 0; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; min-width: 72px; text-align: center; }}
            .badge-rwc    {{ background: #e8f0fb; color: #1a5cb8; border: 1px solid #c5d8f5; }}
            .badge-cnr    {{ background: #f0eafb; color: #6b35c4; border: 1px solid #d8c5f5; }}
            .badge-mkt    {{ background: #e8f8ee; color: #1a8c4e; border: 1px solid #b8e8cc; }}
            .badge-media  {{ background: #fdf8e8; color: #8c6d1a; border: 1px solid #e8d8a0; }}
            .badge-photos {{ background: #e8f4fb; color: #1a6e8c; border: 1px solid #b0d8ee; }}
            .badge-video  {{ background: #fbeaea; color: #b81a1a; border: 1px solid #f0c0c0; }}
            .ad-label {{ flex: 1; font-size: 0.83rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }}
            .ad-arrow {{ flex-shrink: 0; color: #ccc; font-size: 0.78rem; }}
            .due-dot {{ width: 7px; height: 7px; border-radius: 50%; background: #e6a817; flex-shrink: 0; }}
            .no-results {{ text-align: center; color: #bbb; padding: 60px 20px; font-size: 0.88rem; }}
          </style>
          </head>
          <body>
          <div class="header">
            <h1>RWC ACTIVE LISTINGS</h1>
            <div class="subtitle" id="dataDate"></div>
          </div>
          <div class="search-wrap">
            <input type="text" id="search" placeholder="Search by property or account..." oninput="filterCards()" autocomplete="off">
          </div>
          <div class="count-bar" id="countBar"></div>
          <div class="container" id="cardContainer"></div>
          <script>
          const ADS_DATA = {ads_json};
          const DATA_DATE = '{data_date}';
          const MEDIA = {MEDIA};
          const MEDIA_ONLY = {MEDIA_ONLY};
          document.getElementById('dataDate').textContent = 'Updated ' + DATA_DATE;
          function groupByProperty(ads) {{
            const map = {{}};
            for (const ad of ads) {{ if (!map[ad.property]) map[ad.property] = []; map[ad.property].push(ad); }}
            return map;
          }}
          function badgeClass(account) {{
            if (account === 'RWC') return 'badge-rwc';
            if (account === 'CNR') return 'badge-cnr';
            if (account === 'Marketplace') return 'badge-mkt';
            return 'badge-other';
          }}
          function adLabel(ad) {{
            const num = ad.num ? ' ' + ad.num : '';
            return ad.account + num + ' · ' + ad.platLabel;
          }}
          function buildCards(adsData) {{
            const grouped = groupByProperty(adsData);
            const withAds = Object.keys(grouped).sort();
            const mediaOnlyKeys = Object.keys(MEDIA_ONLY).filter(k => !grouped[k]).sort();
            const sorted = [...withAds, ...mediaOnlyKeys];
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            let cardCount = 0;
            for (const prop of sorted) {{
              const propAds = grouped[prop] || [];
              const propMedia = (MEDIA[prop] || []).concat(MEDIA_ONLY[prop] || []);
              if (!propAds.length && !propMedia.length) continue;
              const card = document.createElement('div');
              card.className = 'prop-card';
              let html = '<div class="prop-header"><div class="prop-name">' + prop + '</div></div><div class="ad-list">';
              for (const ad of propAds) {{
                const bc = badgeClass(ad.account);
                const label = adLabel(ad);
                const isDue = ad.status.toLowerCase() === 'due';
                html += '<a class="ad-row" href="' + ad.link + '" target="_blank" rel="noopener">'
                      + '<span class="badge ' + bc + '">' + ad.account + (ad.num ? ' ' + ad.num : '') + '</span>'
                      + '<span class="ad-label">' + label + (isDue ? ' <span style="color:#e6a817;font-size:0.75rem;">· Due</span>' : '') + '</span>'
                      + (isDue ? '<span class="due-dot"></span>' : '')
                      + '<span class="ad-arrow">›</span></a>';
              }}
              for (const m of propMedia) {{
                const mc = m.type === 'video' ? 'badge-video' : m.type === 'photos' ? 'badge-photos' : 'badge-media';
                const tl = m.type === 'video' ? 'VIDEO' : m.type === 'photos' ? 'PHOTOS' : 'MEDIA';
                html += '<a class="ad-row" href="' + m.url + '" target="_blank" rel="noopener">'
                      + '<span class="badge ' + mc + '">' + tl + '</span>'
                      + '<span class="ad-label">' + m.title + '</span>'
                      + '<span class="ad-arrow">›</span></a>';
              }}
              html += '</div>';
              card.innerHTML = html;
              container.appendChild(card);
              cardCount++;
            }}
            document.getElementById('countBar').textContent = adsData.length + ' active ads · ' + cardCount + ' properties';
            if (!cardCount) container.innerHTML = '<div class="no-results">No results found.</div>';
          }}
          function filterCards() {{
            const q = document.getElementById('search').value.toLowerCase().trim();
            if (!q) {{ buildCards(ADS_DATA); return; }}
            const filtered = ADS_DATA.filter(a =>
              a.property.toLowerCase().includes(q) ||
              a.platLabel.toLowerCase().includes(q) ||
              (a.account || '').toLowerCase().includes(q)
            );
            buildCards(filtered);
          }}
          buildCards(ADS_DATA);
          </script>
          </body>
          </html>"""

          with open('index.html', 'w') as f:
              f.write(html)
          print(f"index.html written — {len(html)} chars")
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "Auto-refresh $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push
          )
